name: Deploy Poulina AI Hub to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build production artifact
    runs-on: ubuntu-latest
    env:
      HAS_SUPABASE_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        if: env.HAS_SUPABASE_TOKEN == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy zabbix-auth --project-ref duqxzfyuhdmsnweclnka --no-verify-jwt
          supabase functions deploy zabbix-connector --project-ref duqxzfyuhdmsnweclnka --no-verify-jwt
          supabase functions deploy zabbix-token-mint --project-ref duqxzfyuhdmsnweclnka --no-verify-jwt
          supabase functions deploy sso-redeem --project-ref duqxzfyuhdmsnweclnka --no-verify-jwt
          supabase functions deploy incident-ai --project-ref duqxzfyuhdmsnweclnka --no-verify-jwt
          supabase functions deploy ask-stream --project-ref duqxzfyuhdmsnweclnka --no-verify-jwt

      - name: Verify deployed edge functions are reachable
        if: env.HAS_SUPABASE_TOKEN == 'true'
        run: |
          for fn in zabbix-auth zabbix-connector zabbix-token-mint sso-redeem incident-ai ask-stream; do
            for i in $(seq 1 30); do
              status=$(curl -s -o /tmp/${fn}.json -w "%{http_code}" -X OPTIONS https://duqxzfyuhdmsnweclnka.supabase.co/functions/v1/${fn} \
                -H "Origin: https://poulina-hub-spark.lovable.app" \
                -H "Access-Control-Request-Method: POST" \
                -H "Access-Control-Request-Headers: authorization,apikey,content-type")
              if [ "$status" = "200" ] || [ "$status" = "204" ]; then
                echo "${fn} reachable"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "${fn} not reachable after deploy (HTTP ${status})"
                cat /tmp/${fn}.json
                exit 1
              fi
              sleep 2
            done
          done
          health=$(curl -s -o /tmp/zabbix-token-mint-health.json -w "%{http_code}" https://duqxzfyuhdmsnweclnka.supabase.co/functions/v1/zabbix-token-mint/sso/health \
            -H "Origin: https://poulina-hub-spark.lovable.app")
          if [ "$health" != "200" ]; then
            echo "zabbix-token-mint health check failed (HTTP ${health})"
            cat /tmp/zabbix-token-mint-health.json
            exit 1
          fi
          redeem_health=$(curl -s -o /tmp/sso-redeem-health.json -w "%{http_code}" https://duqxzfyuhdmsnweclnka.supabase.co/functions/v1/sso-redeem/sso/health \
            -H "Origin: https://poulina-hub-spark.lovable.app")
          if [ "$redeem_health" != "200" ]; then
            echo "sso-redeem health check failed (HTTP ${redeem_health})"
            cat /tmp/sso-redeem-health.json
            exit 1
          fi

      - name: Warn if Supabase deploy was skipped
        if: env.HAS_SUPABASE_TOKEN != 'true'
        run: |
          echo "::warning title=Supabase deploy skipped::SUPABASE_ACCESS_TOKEN secret is not set. Add it under Settings → Secrets and variables → Actions to enable automatic edge-function deployment for zabbix-auth, zabbix-connector, zabbix-token-mint, sso-redeem, incident-ai, and ask-stream."

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint
        continue-on-error: true

      - name: Type-check
        run: bunx tsc --noEmit
        continue-on-error: true

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        run: bun run build

      - name: Add CNAME for custom domain
        run: echo "poulinaihub.younesblg.com" > dist/CNAME

      - name: Add SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
