name: Deploy Poulina AI Hub to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build production artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        # Requires repo secret SUPABASE_ACCESS_TOKEN (Supabase dashboard → Account → Access Tokens).
        # Step is skipped (not failed) when the secret is absent, so frontend deploy still ships.
        if: ${{ env.SUPABASE_ACCESS_TOKEN != '' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy zabbix-connector --project-ref sthwjunbanntnnakdkyi --no-verify-jwt
          supabase functions deploy incident-ai --project-ref sthwjunbanntnnakdkyi --no-verify-jwt

      - name: Warn if Supabase deploy was skipped
        if: ${{ env.SUPABASE_ACCESS_TOKEN == '' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "::warning title=Supabase deploy skipped::SUPABASE_ACCESS_TOKEN secret is not set. Add it under Settings → Secrets and variables → Actions to enable automatic edge-function deployment for zabbix-connector and incident-ai."

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint
        continue-on-error: true

      - name: Type-check
        run: bunx tsc --noEmit
        continue-on-error: true

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        run: bun run build

      - name: Add CNAME for custom domain
        run: echo "poulinaihub.younesblg.com" > dist/CNAME

      - name: Add SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
